name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv && uv pip install -e . ruff pytest
      - run: uv run ruff check src tests
      - run: uv run pytest -q
